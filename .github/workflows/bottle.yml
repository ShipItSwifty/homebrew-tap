name: Bottle

on:
  workflow_dispatch:
    inputs:
      version:
        description: ShipItSwifty version to bottle
        required: true
        default: 0.1.0
      formula:
        description: Formula name
        required: true
        default: shipit

permissions:
  contents: write

concurrency:
  group: bottle-${{ inputs.formula }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  FORMULA: ${{ inputs.formula }}
  VERSION: ${{ inputs.version }}
  RELEASE_TAG: ${{ inputs.formula }}-${{ inputs.version }}
  ROOT_URL: https://github.com/ShipItSwifty/homebrew-tap/releases/download/${{ inputs.formula }}-${{ inputs.version }}

jobs:
  bottle:
    name: Bottle (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-26

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Build bottle
        run: |
          brew test-bot --only-cleanup-before
          brew test-bot --only-setup
          brew test-bot --only-formulae --root-url="$ROOT_URL" --testing-formulae="$FORMULA" --skip-dependents --skip-online-checks

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bottles-${{ matrix.runner }}
          if-no-files-found: error
          path: |
            *.bottle.*
            *.json

  publish:
    name: Publish Bottles
    needs: bottle
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Download bottle artifacts
        uses: actions/download-artifact@v6
        with:
          path: bottles

      - name: Move bottle artifacts to workspace root
        run: |
          find bottles -type f -name "*.bottle.*" -exec mv {} . \;
          find bottles -type f -name "*.json" -exec mv {} . \;

      - name: Create or update tap release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" *.bottle.* --clobber
          else
            gh release create "$RELEASE_TAG" *.bottle.* \
              --title "$FORMULA $VERSION bottles" \
              --notes "Homebrew bottles for $FORMULA $VERSION."
          fi

      - name: Merge bottle block into formula
        run: brew bottle --merge --write --no-commit *.json

      - name: Commit bottle block
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add Formula/${FORMULA}.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
          else
            git commit -m "${FORMULA} ${VERSION} bottles"
            git push origin HEAD:main
          fi
