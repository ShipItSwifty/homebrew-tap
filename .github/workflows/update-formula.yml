name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: ShipItSwifty version to publish. Leave blank for latest release.
        required: false
        default: ""
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  update-formula:
    name: Update Formula
    runs-on: ubuntu-24.04

    steps:
      - name: Check out tap
        uses: actions/checkout@v6.0.3

      - name: Resolve release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(gh release view --repo ShipItSwifty/shipitswifty --json tagName --jq .tagName)"
          fi

          current="$(ruby -e 'content = File.read("Formula/shipit.rb"); puts content[/^\s*version "([^"]+)"/, 1] || ""')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          if [ "$version" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prebuilt binaries and compute checksums
        if: steps.release.outputs.changed == 'true'
        id: checksums
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          base_url="https://github.com/ShipItSwifty/shipitswifty/releases/download/$VERSION"

          curl -fsSL -o shipit-macos-universal.tar.gz "$base_url/shipit-macos-universal.tar.gz"
          macos_sha256="$(sha256sum shipit-macos-universal.tar.gz | cut -d ' ' -f 1)"

          curl -fsSL -o shipit-linux-amd64.tar.gz "$base_url/shipit-linux-amd64.tar.gz"
          linux_sha256="$(sha256sum shipit-linux-amd64.tar.gz | cut -d ' ' -f 1)"

          echo "macos_sha256=$macos_sha256" >> "$GITHUB_OUTPUT"
          echo "linux_sha256=$linux_sha256" >> "$GITHUB_OUTPUT"

      - name: Update formula files
        if: steps.release.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          MACOS_SHA256: ${{ steps.checksums.outputs.macos_sha256 }}
          LINUX_SHA256: ${{ steps.checksums.outputs.linux_sha256 }}
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          version     = ENV.fetch("VERSION")
          macos_sha   = ENV.fetch("MACOS_SHA256")
          linux_sha   = ENV.fetch("LINUX_SHA256")

          formula_path = "Formula/shipit.rb"
          formula = File.read(formula_path)

          formula.sub!(
            /on_macos do\n    url "[^"]*"\n    sha256 "[^"]*"\n  end/,
            "on_macos do\n    url \"https://github.com/ShipItSwifty/shipitswifty/releases/download/#{version}/shipit-macos-universal.tar.gz\"\n    sha256 \"#{macos_sha}\"\n  end"
          )

          formula.sub!(
            /on_linux do\n    on_intel do\n      url "[^"]*"\n      sha256 "[^"]*"\n    end\n  end/,
            "on_linux do\n    on_intel do\n      url \"https://github.com/ShipItSwifty/shipitswifty/releases/download/#{version}/shipit-linux-amd64.tar.gz\"\n      sha256 \"#{linux_sha}\"\n    end\n  end"
          )

          formula.sub!(/version "[^"]*"/, "version \"#{version}\"")

          File.write(formula_path, formula)

          readme_path = "README.md"
          readme = File.read(readme_path)
          readme.gsub!(/\| `shipit` \| [^|]+ \| Swift-native CLI for iOS and Android app release automation \|/, "| `shipit` | #{version} | Swift-native CLI for iOS and Android app release automation |")
          File.write(readme_path, readme)
          RUBY

      - name: Commit formula update
        if: steps.release.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/shipit.rb README.md

          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git commit -m "shipit $VERSION"
          git push origin HEAD:main
