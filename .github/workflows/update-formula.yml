name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: ShipItSwifty version to publish. Leave blank for latest release.
        required: false
        default: ""
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  update-formula:
    name: Update Formula
    runs-on: ubuntu-24.04

    steps:
      - name: Check out tap
        uses: actions/checkout@v6.0.3

      - name: Resolve release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(gh release view --repo ShipItSwifty/shipitswifty --json tagName --jq .tagName)"
          fi

          current="$(ruby -e 'content = File.read("Formula/shipit.rb"); puts content[/stable do\s+version "(.+?)"/, 1] || ""')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          if [ "$version" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula files
        if: steps.release.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          macos_url="https://github.com/ShipItSwifty/shipitswifty/releases/download/$VERSION/shipit-$VERSION-macos-universal.tar.gz"
          linux_url="https://github.com/ShipItSwifty/shipitswifty/releases/download/$VERSION/shipit-$VERSION-linux-static.tar.gz"

          curl -fsSL -o shipit-macos.tar.gz "$macos_url"
          curl -fsSL -o shipit-linux.tar.gz "$linux_url"

          export MACOS_URL="$macos_url"
          export LINUX_URL="$linux_url"
          export MACOS_SHA256="$(shasum -a 256 shipit-macos.tar.gz | cut -d ' ' -f 1)"
          export LINUX_SHA256="$(shasum -a 256 shipit-linux.tar.gz | cut -d ' ' -f 1)"

          ruby <<'RUBY'
          version    = ENV.fetch("VERSION")
          macos_url  = ENV.fetch("MACOS_URL")
          linux_url  = ENV.fetch("LINUX_URL")
          macos_sha  = ENV.fetch("MACOS_SHA256")
          linux_sha  = ENV.fetch("LINUX_SHA256")

          formula_path = "Formula/shipit.rb"
          formula = File.read(formula_path)

          formula.gsub!(/version "[^"]+"/, "version \"#{version}\"")
          formula.gsub!(%r{releases/download/[^/]+/shipit-[^"]+-macos-universal\.tar\.gz},
                        "releases/download/#{version}/shipit-#{version}-macos-universal.tar.gz")
          formula.gsub!(%r{releases/download/[^/]+/shipit-[^"]+-linux-static\.tar\.gz},
                        "releases/download/#{version}/shipit-#{version}-linux-static.tar.gz")
          formula.gsub!(/(on_macos do\n\s+url "[^"]+"\n\s+sha256 ")[^"]+/, "\\1#{macos_sha}")
          formula.gsub!(/(on_linux do\n\s+url "[^"]+"\n\s+sha256 ")[^"]+/, "\\1#{linux_sha}")

          File.write(formula_path, formula)

          readme_path = "README.md"
          readme = File.read(readme_path)
          readme.gsub!(/\| `shipit` \| [^|]+ \| Swift-native CLI for iOS and Android app release automation \|/,
                       "| `shipit` | #{version} | Swift-native CLI for iOS and Android app release automation |")
          File.write(readme_path, readme)
          RUBY

      - name: Commit formula update
        if: steps.release.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/shipit.rb README.md

          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git commit -m "shipit $VERSION"
          git push origin HEAD:main
